#user  nobody;
worker_processes 1;
error_log  E:/Developer/nginx/nginx-1.22.1/logs/error.log;
error_log  E:/Developer/nginx/nginx-1.22.1/logs/error.log  notice;
error_log  E:/Developer/nginx/nginx-1.22.1/logs/error.log  info;
pid        E:/Developer/nginx/nginx-1.22.1/logs/nginx.pid;
events {
  worker_connections 1024;
}
http {
  include mime.types;
  default_type application/octet-stream;
  # log_format main '$remote_addr - $remote_user [$time_local] "$request" ' '$status $body_bytes_sent "$http_referer" ' '"$http_user_agent" "$http_x_forwarded_for"';

  log_format custom_format '[$time_iso8601] ' '$status "$request_uri" ';

  #access_log  logs/access.log  main;
  proxy_connect_timeout 600s;
  proxy_read_timeout 600s;
  proxy_send_timeout 600s;
  send_timeout 600s;
  sendfile on;
  #tcp_nopush     on;
  keepalive_timeout 120s 120s;
  keepalive_requests 10000;
  #keepalive_timeout  0;
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }
  #gzip  on;
  server {
    listen 9527;  
    server_name localhost;
    charset utf-8;
    access_log E:/Developer/nginx/nginx-1.22.1/logs/ngx_sp.access.log custom_format;
    error_log E:/Developer/nginx/nginx-1.22.1/logs/ngx_sp.err.log;
    client_max_body_size 5000M;
    location / {
      # 获取原始路径，并转发给目标服务器
      proxy_pass http://localhost:4399;

      # 保持原请求头
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      access_log E:/Developer/nginx/nginx-1.22.1/logs/access_chfs.log custom_format;
      error_log E:/Developer/nginx/nginx-1.22.1/logs/error_chfs.log;
      # root html/dist;
      # index index.html index.htm;
      # try_files $uri $uri/ /index.html;
    }
    location /windpxp/ {      
      rewrite ^/windpxp/(.*)$ /\$1 break;  # 将 /windpxp/ 去掉
      proxy_pass http://192.168.28.91:4399;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      access_log E:/Developer/nginx/nginx-1.22.1/logs/access_chfs.log custom_format;
      error_log E:/Developer/nginx/nginx-1.22.1/logs/error_chfs.log;
    }    
  }
}
